name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  sie-quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pip-audit

      - name: Dependency CVE audit
        run: |
          python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Lint
        run: |
          python -m ruff check tools/sie_autoppt/cli.py tools/sie_autoppt/clarify_web.py tools/sie_autoppt/exceptions.py tools/sie_autoppt/cli_parser.py --select F
          python -m ruff check tools/sie_autoppt/v2 tools/sie_autoppt/planning tools/sie_autoppt/qa --select F
          python -m ruff check tests/test_cli.py tests/test_clarify_web.py tests/test_v2_services.py tests/test_v2_quality_checks.py --select F

      - name: Test - CLI smoke and core gates
        run: |
          python -m pytest tests/test_cli.py -q
          python -m pytest tests/test_svg_primary_pipeline.py -q
          python -m pytest tests/test_sie_palette_enforcement.py -q
          python -m pytest tests/test_content_density_split.py -q

      - name: Coverage gate
        run: |
          python -m coverage run --source=tools.sie_autoppt.cli,tools.sie_autoppt.clarify_web,tools.sie_autoppt.exceptions -m pytest tests/test_cli.py tests/test_clarifier.py tests/test_clarify_web.py -q
          python -m coverage report -m --fail-under=70
